# default.custom.yaml
patch:
  schema_list:
    - schema: keytao

  switcher:
    caption: "「切换方案」"
    hotkeys:
      - Control+Shift+asciitilde
    save_options:
      - full_shape
      - ascii_punct
      - simplification
      - extended_charset
    fold_options: false 
    abbreviate_options: true
    option_list_separator: '／'

  menu:
    page_size: 5

  key_binder:
    bindings:
      - { when: always, accept: Control+F24, send: Eisu_toggle }
      - { when: has_menu, accept: minus, send: Page_Up }
      - { when: has_menu, accept: equal, send: Page_Down }
      - { when: composing, accept: KP_0, send: '0' }
      - { when: composing, accept: KP_1, send: '1' }
      - { when: composing, accept: KP_2, send: '2' }
      - { when: composing, accept: KP_3, send: '3' }
      - { when: composing, accept: KP_4, send: '4' }
      - { when: composing, accept: KP_5, send: '5' }
      - { when: composing, accept: KP_6, send: '6' }
      - { when: composing, accept: KP_7, send: '7' }
      - { when: composing, accept: KP_8, send: '8' }
      - { when: composing, accept: KP_9, send: '9' }
      - { when: composing, accept: KP_Decimal, send: '.' }
      - { when: composing, accept: KP_Add, send: '+' }
      - { when: composing, accept: KP_Subtract, send: '-' }
      - { when: composing, accept: KP_Multiply, send: '*' }
      - { when: composing, accept: KP_Divide, send: '/' }

  ascii_composer:
    good_old_caps_lock: true
    switch_key:
      Eisu_toggle: commit_text