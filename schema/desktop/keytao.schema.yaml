# Rime schema settings
# encoding: utf-8

schema:
  schema_id: keytao
  name: 键道6
  version: "2.2"
  dependencies:
    - keytao-lf


# Layout config
layout:
  topup:
    topup_this: "bcdefghjklmnpqrstwxyz"
    topup_with: "avuio"

  algebra:
    - derive/^[bcdefghjklmnpqrstwxyz]([bcdefghjklmnpqrstwxyz][avuio].*)$/`$1/
    - derive/^([bcdefghjklmnpqrstwxyz])[bcdefghjklmnpqrstwxyz]([avuio].*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz`]{2})[avuio](.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz`]{2}[avuio`]).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz`]{2}[avuio`]{2}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz`]{2}[avuio`]{3}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz`]{2}[avuio`]{4}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz`]{2}[avuio`]{5}).$/$1`/
    - derive/^[bcdefghjklmnpqrstwxyz]{2}([avuio`]*)$/``$1/

  patterns:
    special: "^[avuio][a-z]{0,}"


switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: ascii_punct
    states: [ 。，, ．， ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    reset: 0
    states: [ 简体, 繁體 ]
  - name: emoji_cn
    reset: 0
    states: [ "关表情", "开表情" ]
  - name: danzi_mode
    reset: 0
    states: [ "词组", "单字" ]
  - name: sbb_hint
    reset: 1
    states: [ "关₆₃₀", "开₆₃₀" ]
  - name: sbb_disable_full
    reset: 0
    states: [ "开₆₃₀全码", "关₆₃₀全码" ]
  - name: topup_hint  # lua: keytao_filter.lua
    reset: 1
    states: [ "关顶功提示", "开顶功提示" ]


punctuator:
  import_preset: symbols


engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - lua_processor@topup_processor
    - lua_processor@smart_2
    - lua_processor@add_ge
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - history_translator@repeat_history
    - table_translator@custom_phrase
    - reverse_lookup_translator@liangfen_lookup
    - lua_translator@oboot_translator
    - lua_translator@number_translator
  filters:
    - simplifier@emoji_cn
    - simplifier@simplification
    - uniquifier
    - reverse_lookup_filter@danzi_lookup
    - lua_filter@single_char_filter
    - lua_filter@keytao_filter


speller:
  algebra:
    __include: "layout/algebra"
  auto_select: false
  auto_select_unique_candidate: false
  alphabet: "abcdefghijklmnopqrstuvwxyz`"
  initials: "abcdefghijklmnopqrstuvwxyz`"


translator:
  dictionary: keytao.extended
  enable_charset_filter: false
  enable_completion: true
  enable_encoder: true
  enable_sentence: false
  enable_user_dict: false
  encode_commit_history: true
  max_phrase_length: 6


repeat_history:
  input: v #重复上次上屏内容
  size: 2
  initial_quality: 10000


emoji_cn:
  opencc_config: emoji.json
  option_name: emoji_cn
  tips: all


simplification:
  opencc_config: s2t.json
  option_name: simplification


danzi_lookup:
  dictionary: keytao.extended
  tags: [ danzi_lookup ]
  overwrite_comment: true
  enable_charset_filter: false
  enable_completion: true
  enable_encoder: false
  enable_sentence: false
  enable_user_dict: false
  encode_commit_history: false
  comment_format:
    - xform/^/〔/
    - xform/$/〕/
    - xform/ /, /


liangfen_lookup:
  dictionary: keytao-lf
  tag: liangfen_lookup
  prefix: "i"
  enable_charset_filter: false
  enable_completion: true
  enable_encoder: false
  enable_sentence: false
  enable_user_dict: false
  encode_commit_history: false
  comment_format:
    - xform/^/〔/
    - xform/$/〕/
    - xform/ /, /


custom_phrase:
  dictionary: ""
  user_dict: user_dict
  db_class: stabledb
  enable_sentence: false
  initial_quality: "0"


key_binder:
  import_preset: default
  add_ge: "slash"


recognizer:
  patterns:
    email: "^[a-z][-_.0-9a-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"
    
    pinyin: "(?<![`A-Z])`[a-z']*?$"
    danzi_lookup: "[a-z`]*`+[a-z`]*"
    liangfen_lookup: "^i[a-z]*?$"
    jsq: "^u[^;']+$"


topup:
  __include: "layout/topup"
  min_length: 4
  max_length: 6
  auto_clear: true
  min_length_danzi: 2
  topup_command: true
